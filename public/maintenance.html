<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>China Monitor - Maintenance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=DSEG14&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --bg-color: #0f172a;
      --text-color: #f1f5f9;
      --accent-color: #3b82f6;
      --card-bg: #1e293b;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    
    .maintenance-container {
      text-align: center;
      max-width: 600px;
    }
    
    .maintenance-icon {
      font-size: 5rem;
      color: var(--accent-color);
      margin-bottom: 2rem;
    }
    
    h1 {
      font-family: 'DSEG14', monospace;
      font-size: 2.5rem;
      margin-bottom: 1rem;
      font-weight: normal;
      color: var(--text-color);
    }
    
    p {
      font-size: 1.1rem;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    
    .status-badge {
      display: inline-block;
      padding: 0.5rem 1rem;
      background: var(--card-bg);
      border-radius: 4px;
      font-size: 0.9rem;
      margin-top: 1rem;
    }
    
    .refresh-btn {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: var(--accent-color);
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    
    .refresh-btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="maintenance-container">
    <i class="fa-solid fa-screwdriver-wrench maintenance-icon"></i>
    <h1>Under Maintenance</h1>
    <p>China Monitor is currently undergoing scheduled maintenance. We'll be back online shortly.</p>
    <p>Thank you for your patience.</p>
    <div class="status-badge">
      <i class="fa-solid fa-circle-exclamation"></i> Services temporarily unavailable
    </div>
    <br>
    <a href="/" class="refresh-btn">
      <i class="fa-solid fa-rotate-right"></i> Try Again
    </a>
  </div>
</body>
</html>
