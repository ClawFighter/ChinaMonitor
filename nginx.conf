# China Monitor - Nginx Configuration
# For production deployment

server {
    listen 80;
    server_name chinamonitor.app www.chinamonitor.app;
    
    # Frontend static files
    location / {
        root /root/.openclaw/workspace/china-monitor/dist;
        try_files $uri $uri/ /index.html;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }
    
    # News API proxy (localhost only)
    location /api/news {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Security: Only allow local connections
        allow 127.0.0.1;
        deny all;
    }
    
    # Weather API proxy (localhost only)
    location /api/weather {
        proxy_pass http://127.0.0.1:3101;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Security: Only allow local connections
        allow 127.0.0.1;
        deny all;
    }
    
    # Logs
    access_log /var/log/nginx/chinamonitor_access.log;
    error_log /var/log/nginx/chinamonitor_error.log;
}

